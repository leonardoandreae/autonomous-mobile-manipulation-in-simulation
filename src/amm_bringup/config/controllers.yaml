controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    fr3_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    fr3_gripper_controller:
      type: parallel_gripper_action_controller/GripperActionController

fr3_arm_controller:
  ros__parameters:
    joints:
      - fr3_joint1
      - fr3_joint2
      - fr3_joint3
      - fr3_joint4
      - fr3_joint5
      - fr3_joint6
      - fr3_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: true

fr3_gripper_controller:
  ros__parameters:
    joint: fr3_finger_joint1
    parallel_joints: [fr3_finger_joint2]
    action_monitor_rate: 20.0
    allow_stalling: false
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
    goal_tolerance: 0.01
    max_effort: 50.0
