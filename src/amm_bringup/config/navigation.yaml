# Shared navigation parameters for navigation_manager and mission_executive.
# All coordinates are in the Isaac Sim world frame (metres).
# Adjust these to match your actual room layout in the USD scene.

navigation_manager_node:
  ros__parameters:
    waypoints:
      room1:
        x: 2.0
        y: 0.0
        yaw: 0.0          # degrees
      room2:
        x: 4.0
        y: 4.0
        yaw: 180.0
      room3:
        x: 0.0
        y: 4.0
        yaw: 90.0
      base:
        x: 0.0
        y: 0.0
        yaw: 0.0

mission_executive_node:
  ros__parameters:
    room1:
      x: 2.0
      y: 0.0
    room2:
      x: 4.0
      y: 4.0
    room3:
      x: 0.0
      y: 4.0
    base:
      x: 0.0
      y: 0.0
