# ros_gz_bridge.yaml
# ===================
# Topic bridge configuration for Gazebo Harmonic ↔ ROS 2 Jazzy.
#
# Direction:
#   GZ_TO_ROS  — Gazebo publishes, ROS 2 subscribes
#   ROS_TO_GZ  — ROS 2 publishes, Gazebo subscribes
#   BIDIRECTIONAL

# ── Clock ─────────────────────────────────────────────────────────────────────
- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS

# ── Odometry ──────────────────────────────────────────────────────────────────
- ros_topic_name: /odom
  gz_topic_name: /model/ridgeback_franka/odometry
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS

# ── Ground-truth pose (for debugging) ────────────────────────────────────────
- ros_topic_name: /model_pose
  gz_topic_name: /model/ridgeback_franka/pose
  ros_type_name: geometry_msgs/msg/PoseStamped
  gz_type_name: gz.msgs.Pose
  direction: GZ_TO_ROS

# ── Base velocity command (mecanum drive) ─────────────────────────────────────
- ros_topic_name: /cmd_vel
  gz_topic_name: /model/ridgeback_franka/cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

# ── LiDAR scan ────────────────────────────────────────────────────────────────
- ros_topic_name: /scan
  gz_topic_name: /lidar/scan
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_type_name: gz.msgs.LaserScan
  direction: GZ_TO_ROS

# ── IMU ───────────────────────────────────────────────────────────────────────
- ros_topic_name: /imu
  gz_topic_name: /imu/data
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS

# ── RGB-D camera ──────────────────────────────────────────────────────────────
- ros_topic_name: /camera/image_raw
  gz_topic_name: /camera/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /camera/camera_info
  gz_topic_name: /camera/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS

- ros_topic_name: /camera/depth/image_raw
  gz_topic_name: /camera/depth_image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /camera/depth/points
  gz_topic_name: /camera/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS

# ── Joint states (arm + gripper, via gz_ros2_control) ─────────────────────────
- ros_topic_name: /joint_states
  gz_topic_name: /joint_states
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: gz.msgs.Model
  direction: GZ_TO_ROS

# ── TF (from Gazebo pose publisher) ──────────────────────────────────────────
- ros_topic_name: /tf
  gz_topic_name: /tf
  ros_type_name: tf2_msgs/msg/TFMessage
  gz_type_name: gz.msgs.Pose_V
  direction: GZ_TO_ROS

# ── World model poses (used by amm_perception in Gazebo mode) ─────────────────
# Bridges all model poses so the perception node can look up any model by name
# as a TF frame (frame_id = model name, parent = world).
- ros_topic_name: /gz/world_poses
  gz_topic_name: /world/three_room_world/pose/info
  ros_type_name: tf2_msgs/msg/TFMessage
  gz_type_name: gz.msgs.Pose_V
  direction: GZ_TO_ROS
